apiVersion: v1
kind: Service
metadata:
  name: factorio
  namespace: factorio
spec:
  type: LoadBalancer
  selector:
    app: factorio
  ports:
    - name: game
      port: 34197
      targetPort: 34197
      protocol: UDP
    - name: rcon
      port: 27015
      targetPort: 27015
      protocol: TCP
