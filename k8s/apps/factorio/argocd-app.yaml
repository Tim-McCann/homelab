apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: factorio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tim-McCann/homelab.git
    targetRevision: HEAD
    path: k8s/apps/factorio
  destination:
    server: https://kubernetes.default.svc
    namespace: factorio
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
