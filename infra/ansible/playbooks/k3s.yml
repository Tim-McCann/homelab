---
# k3s.yml
# Installs k3s across 3 VMs provisioned by Terraform.
# Run after terraform apply confirms all 3 VMs are up.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/k3s.yml

- name: Install k3s control plane
  hosts: k3s_control
  become: true
  gather_facts: true

  tasks:
    - name: Install k3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
          --disable traefik \
          --node-ip {{ ansible_host }}
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      ansible.builtin.shell: k3s kubectl get nodes
      register: nodes
      until: nodes.rc == 0
      retries: 20
      delay: 10
      changed_when: false

    - name: Get k3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set token fact
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Get kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig

    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig.content | b64decode | replace('127.0.0.1', ansible_host) }}"
        dest: ~/.kube/homelab-config
        mode: '0600'
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false

- name: Install k3s workers
  hosts: k3s_workers
  become: true
  gather_facts: true

  tasks:
    - name: Get control plane token
      ansible.builtin.set_fact:
        k3s_node_token: "{{ hostvars[groups['k3s_control'][0]]['k3s_node_token'] }}"
        k3s_server_ip: "{{ hostvars[groups['k3s_control'][0]]['ansible_host'] }}"

    - name: Install k3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_server_ip }}:6443 \
          K3S_TOKEN={{ k3s_node_token }} sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for agent to join cluster
      ansible.builtin.shell: systemctl is-active k3s-agent
      register: agent_status
      until: agent_status.stdout == "active"
      retries: 20
      delay: 10
      changed_when: false

- name: Verify cluster
  hosts: k3s_control
  become: true
  gather_facts: false

  tasks:
    - name: Check all nodes are ready
      ansible.builtin.shell: k3s kubectl get nodes
      register: cluster_nodes
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines

- name: Install QEMU guest agent on k3s nodes
  hosts: k3s_cluster
  become: true
  gather_facts: false

  tasks:
    - name: Install qemu-guest-agent
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
        update_cache: true

    - name: Enable and start qemu-guest-agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started
