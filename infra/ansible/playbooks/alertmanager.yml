---
- name: Install Alertmanager with Discord notifications
  hosts: prometheus
  become: true
  gather_facts: false

  vars:
    alertmanager_version: "0.27.0"
    discord_webhook: "{{ lookup('env', 'DISCORD_WEBHOOK') }}"

  tasks:
    - name: Set DNS and route
      ansible.builtin.copy:
        content: "nameserver 8.8.8.8\n"
        dest: /etc/resolv.conf

    - name: Fix default route
      ansible.builtin.shell: ip route replace default via {{ lxc_gateway }}
      changed_when: false

    - name: Create alertmanager user
      ansible.builtin.user:
        name: alertmanager
        shell: /bin/false
        system: true
        create_home: false

    - name: Create alertmanager directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: alertmanager
        group: alertmanager
        mode: '0755'
      loop:
        - /etc/alertmanager
        - /var/lib/alertmanager

    - name: Download Alertmanager
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
        dest: /tmp/alertmanager.tar.gz
        mode: '0644'

    - name: Extract Alertmanager
      ansible.builtin.unarchive:
        src: /tmp/alertmanager.tar.gz
        dest: /tmp/
        remote_src: true

    - name: Install Alertmanager binary
      ansible.builtin.copy:
        src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager"
        dest: /usr/local/bin/alertmanager
        remote_src: true
        mode: '0755'

    - name: Install amtool binary
      ansible.builtin.copy:
        src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/amtool"
        dest: /usr/local/bin/amtool
        remote_src: true
        mode: '0755'

    - name: Write Alertmanager config
      ansible.builtin.copy:
        dest: /etc/alertmanager/alertmanager.yml
        owner: alertmanager
        group: alertmanager
        mode: '0644'
        content: |
          global:
            resolve_timeout: 5m

          route:
            group_by: ['alertname', 'severity']
            group_wait: 10s
            group_interval: 5m
            repeat_interval: 4h
            receiver: 'discord'

          receivers:
            - name: 'discord'
              discord_configs:
                - webhook_url: '{{ discord_webhook }}'
                  send_resolved: true
                  title: '{% raw %}{{ .CommonLabels.alertname }}{% endraw %}'
                  message: '{% raw %}{{ range .Alerts }}**{{ .Labels.severity | toUpper }}** - {{ .Annotations.summary }}
          {{ .Annotations.description }}{{ end }}{% endraw %}'

          inhibit_rules:
            - source_match:
                severity: 'critical'
              target_match:
                severity: 'warning'
              equal: ['alertname', 'instance']
      notify: Restart alertmanager

    - name: Create Alertmanager systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/alertmanager.service
        mode: '0644'
        content: |
          [Unit]
          Description=Alertmanager
          After=network.target

          [Service]
          User=alertmanager
          Group=alertmanager
          Type=simple
          ExecStart=/usr/local/bin/alertmanager \
            --config.file=/etc/alertmanager/alertmanager.yml \
            --storage.path=/var/lib/alertmanager \
            --web.listen-address=0.0.0.0:9093
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart alertmanager

    - name: Enable and start Alertmanager
      ansible.builtin.systemd:
        name: alertmanager
        enabled: true
        state: started
        daemon_reload: true

    - name: Update Prometheus config to use Alertmanager
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          alerting:
            alertmanagers:
              - static_configs:
                  - targets: ['localhost:9093']

          rule_files:
            - /etc/prometheus/alerts.yml

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node-nuc5'
              static_configs:
                - targets: ['192.168.1.20:9100']

            - job_name: 'node-k3s-cp'
              static_configs:
                - targets: ['192.168.1.30:9100']

            - job_name: 'node-k3s-w1'
              static_configs:
                - targets: ['192.168.1.31:9100']

            - job_name: 'node-k3s-w2'
              static_configs:
                - targets: ['192.168.1.32:9100']

            - job_name: 'kube-state-metrics'
              static_configs:
                - targets: ['192.168.1.30:30080']
      notify: Restart prometheus

  handlers:
    - name: Restart alertmanager
      ansible.builtin.systemd:
        name: alertmanager
        state: restarted
        daemon_reload: true

    - name: Restart prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted
