---
# Ansible Inventory for Homelab Proxmox Infrastructure
#
# Groups:
#   - proxmox_hosts: Proxmox VE hypervisor nodes (managed directly via SSH)
#   - edge_lxc: LXC containers running on the NUC5 edge Proxmox node
#   - lxc_vpn: Containers requiring VPN/TUN access (Tailscale)

all:
  vars:
    # Global variables
    ansible_become: true
    ansible_become_method: sudo

proxmox_hosts:
  hosts:
    pve-nuc5-edge:
      ansible_host: 192.168.1.20
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      pve_node_name: pve-nuc5-edge
      description: "Intel NUC5i5RYH - Edge services node"

edge_lxc:
  hosts:
    pihole:
      ansible_host: 192.168.1.21
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 100
      hostname: pihole
      description: "DNS service (Pi-hole)"

    tailscale:
      ansible_host: 192.168.1.22
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 101
      hostname: tailscale
      description: "VPN service (Tailscale)"

    uptime-kuma:
      ansible_host: 192.168.1.23
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 102
      hostname: uptime-kuma
      description: "Uptime monitoring (Uptime Kuma)"

    pbs:
      ansible_host: 192.168.1.24
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 103
      hostname: pbs
      description: "Proxmox Backup Server"

  vars:
    # LXC-specific variables
    lxc_gateway: 192.168.1.254  # Real gateway on the network (not 192.168.1.1)
    lxc_nameservers:
      - 8.8.8.8
      - 8.8.4.4

lxc_vpn:
  # Containers requiring VPN/TUN device access
  hosts:
    tailscale:
      ansible_host: 192.168.1.22
  vars:
    require_tun_device: true
    require_nesting: true

# Silence interpreter discovery warnings - pin explicitly per host group
# edge_lxc containers run Debian 12 bookworm = Python 3.11
# proxmox_hosts run Proxmox VE 9 (Debian 13 trixie) = Python 3.13
