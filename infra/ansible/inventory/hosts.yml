---
# Ansible Inventory for Homelab Proxmox Infrastructure
#
# Groups:
#   - proxmox_hosts: Proxmox VE hypervisor nodes (managed directly via SSH)
#   - edge_lxc: LXC containers running on the NUC5 edge Proxmox node
#   - lxc_vpn: Containers requiring VPN/TUN access (Tailscale)
#
# Python interpreter pinned per group to silence discovery warnings:
#   proxmox_hosts = Python 3.13 (Debian 13 Trixie / PVE 9)
#   edge_lxc      = Python 3.11 (Debian 12 Bookworm)

all:
  vars:
    ansible_become: true
    ansible_become_method: sudo

proxmox_hosts:
  vars:
    ansible_python_interpreter: /usr/bin/python3.13
  hosts:
    pve-nuc5-edge:
      ansible_host: 192.168.1.20
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      pve_node_name: pve-nuc5-edge
      description: "Intel NUC5i5RYH - Edge services node"
    g4-platform:
      ansible_host: 192.168.1.10
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      pve_node_name: g4-platform
      description: "HP EliteDesk G4 - Compute node"

edge_lxc:
  vars:
    ansible_python_interpreter: /usr/bin/python3.11
    lxc_gateway: 192.168.1.20
    lxc_nameservers:
      - 8.8.8.8
      - 8.8.4.4
  hosts:
    pihole:
      ansible_host: 192.168.1.21
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 100
      hostname: pihole
      description: "DNS service (Pi-hole)"
    tailscale:
      ansible_host: 192.168.1.22
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 101
      hostname: tailscale
      description: "VPN service (Tailscale)"
    uptime-kuma:
      ansible_host: 192.168.1.23
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 102
      hostname: uptime-kuma
      description: "Uptime monitoring (Uptime Kuma)"
    pbs:
      ansible_host: 192.168.1.24
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 103
      hostname: pbs
      description: "Proxmox Backup Server"

lxc_vpn:
  vars:
    require_tun_device: true
    require_nesting: true
  hosts:
    tailscale:
      ansible_host: 192.168.1.22

k3s_cluster:
  children:
    k3s_control:
      hosts:
        k3s-cp-01:
          ansible_host: 192.168.1.30
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
    k3s_workers:
      hosts:
        k3s-w-01:
          ansible_host: 192.168.1.31
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
        k3s-w-02:
          ansible_host: 192.168.1.32
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519

observability:
  vars:
    ansible_python_interpreter: /usr/bin/python3.11
    lxc_gateway: 192.168.1.20
    lxc_nameservers:
      - 8.8.8.8
      - 8.8.4.4
  hosts:
    prometheus:
      ansible_host: 192.168.1.25
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 104
      hostname: prometheus
    grafana:
      ansible_host: 192.168.1.26
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 105
      hostname: grafana
    loki:
      ansible_host: 192.168.1.27
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/homelab_ed25519
      vmid: 106
      hostname: loki
